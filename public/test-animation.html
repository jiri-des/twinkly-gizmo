<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Car Mask – Animation Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }

    .stage {
      position: relative;
      width: 100%;
      height: 100dvh;
      cursor: pointer;
      /* fake camera background */
      background: radial-gradient(ellipse at 40% 60%, #2a2a2a 0%, #0d0d0d 100%);
    }

    .svg-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #label {
      position: absolute;
      top: max(env(safe-area-inset-top), 16px);
      left: 0; right: 0;
      margin-top: 16px;
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      pointer-events: none;
    }

    #hint {
      position: absolute;
      bottom: calc(max(env(safe-area-inset-bottom), 12px) + 32px);
      left: 0; right: 0;
      text-align: center;
      color: rgba(255,255,255,0.32);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      pointer-events: none;
    }

    #progress {
      position: absolute;
      bottom: max(env(safe-area-inset-bottom), 16px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      pointer-events: none;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      transition: background 0.35s, transform 0.35s;
    }
    .dot.active {
      background: rgba(255,255,255,0.85);
      transform: scale(1.2);
    }

    /* vertical split-line: only visible during left/right half states */
    #split-line {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 7;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #split-line.visible { opacity: 1; }
  </style>
</head>
<body>
<div class="stage" id="stage">

  <!-- Dark overlay with car cut-out (evenodd) -->
  <svg id="overlay-svg" class="svg-layer"
       preserveAspectRatio="xMidYMid meet"
       overflow="visible"
       style="z-index:5">
    <path id="overlay-path" fill-rule="evenodd" fill="rgba(0,0,0,0.52)"/>
  </svg>

  <!-- Car outline (inline path, no filter/blend-mode needed) -->
  <svg id="outline-svg" class="svg-layer"
       preserveAspectRatio="xMidYMid meet"
       style="z-index:6">
    <path id="outline-path" fill="none"
          stroke="rgba(255,255,255,0.82)" stroke-width="3.5"
          stroke-linejoin="round" stroke-linecap="round"/>
    <!-- vertical centre split guide line -->
    <line id="centre-line"
          x1="285.5" y1="69" x2="285.5" y2="398"
          stroke="rgba(255,200,50,0.55)" stroke-width="1.5"
          stroke-dasharray="6 5"
          opacity="0"/>
  </svg>

  <div id="label">Celé auto</div>
  <div id="hint">Klepni nebo počkej →</div>
  <div id="progress">
    <div class="dot active" id="dot-0"></div>
    <div class="dot"        id="dot-1"></div>
    <div class="dot"        id="dot-2"></div>
  </div>
</div>

<script>
// ─── Car path (outer boundary, 568×442 coordinate space) ────────────────────
const CAR_HOLE = `M 142.3 379.56 C 145.55 377.83 148.61 374.38 149.89 370.98 C 150.73 368.66 150.88 367.13 150.88 360.58 L 150.88 352.94 L 154.97 353.24 C 179.82 355.16 245.05 356.99 288.19 356.99 C 329.11 356.99 395.04 355.07 416.43 353.24 L 419.93 352.94 L 420.18 360.98 C 420.43 367.69 420.62 369.46 421.46 371.38 C 422.84 374.49 426.09 377.99 429.2 379.56 L 431.67 380.89 L 457.31 380.89 L 482.95 380.89 L 485.07 379.76 C 488.32 378.03 490.94 375.42 492.42 372.36 L 493.8 369.55 L 493.8 298.55 C 493.8 232.04 493.75 227.3 492.91 223.46 C 489.71 208.52 482.41 199.1 465.05 187.47 L 457.95 182.69 L 469.44 182.44 C 482.21 182.09 483.34 181.9 487.63 178.74 C 493.3 174.6 495.67 167.45 493.84 160.25 C 491.77 152.26 486.3 147.87 476.29 146.2 C 473.73 145.76 469.49 144.87 466.92 144.18 C 461.05 142.7 456.12 142.6 452.42 143.98 C 447.24 145.95 443.15 150.93 442.41 156.36 L 442.02 159.02 L 439.8 159.17 L 437.58 159.32 L 435.46 152.81 C 429.64 135.11 418.84 113.37 411.4 104.39 C 406.81 98.77 400.65 94.53 393.85 92.21 C 387.79 90.14 374.57 88.71 344.15 86.93 C 325.56 85.85 253.82 85.65 234.69 86.68 C 200.92 88.45 184.5 89.93 178.68 91.76 C 172.22 93.73 166.25 97.53 161.57 102.51 C 154.03 110.6 142.64 133.08 136.08 152.85 L 133.71 160 L 131.49 160.15 L 129.32 160.3 L 128.97 157.59 C 128.33 152.07 124.93 147.09 120.05 144.57 C 116.45 142.75 111.03 142.5 105.46 143.98 C 100.87 145.21 99.05 145.61 93.77 146.45 C 86.57 147.63 81.25 151.38 78.44 157.3 C 77.4 159.57 77.16 160.7 77.16 164.45 C 77.16 170.76 79.33 175.45 83.82 178.75 C 88.06 181.86 89.24 182.1 102.06 182.4 L 113.65 182.7 L 107.49 186.84 C 89.25 199.12 82.89 206.71 78.94 220.91 L 77.66 225.59 L 77.51 296.29 C 77.36 373.4 77.26 369.71 80.12 374.24 C 81.89 377.1 85.3 379.61 88.75 380.7 C 89.44 380.9 101.18 381.05 114.88 381 L 139.78 380.9 L 142.29 379.57 Z`;

const OVERLAY_PATH = `M -10000 -10000 L 20000 -10000 L 20000 20000 L -10000 20000 Z ${CAR_HOLE}`;

// ─── States ──────────────────────────────────────────────────────────────────
// Car occupies x:77–494, y:86–381 in 568×442 space. Centre x ≈ 285.5.
// Full view  : viewBox "60 69 451 329"  (car fills ~92 % width)
// Left half  : viewBox "60 69 226 329"  (x:60→286, 2× zoom)
// Right half : viewBox "285 69 226 329" (x:285→511, 2× zoom)
const STATES = [
  { x: 60,  y: 69, w: 451, h: 329, label: 'Celé auto',       showLine: false },
  { x: 60,  y: 69, w: 226, h: 329, label: 'Levá polovina',   showLine: true  },
  { x: 285, y: 69, w: 226, h: 329, label: 'Pravá polovina',  showLine: true  },
];

// ─── DOM refs ────────────────────────────────────────────────────────────────
const overlaySvg  = document.getElementById('overlay-svg');
const overlayPath = document.getElementById('overlay-path');
const outlineSvg  = document.getElementById('outline-svg');
const outlinePath = document.getElementById('outline-path');
const centreLine  = document.getElementById('centre-line');
const labelEl     = document.getElementById('label');
const dots        = Array.from(document.querySelectorAll('.dot'));

// init paths (don't change during animation)
overlayPath.setAttribute('d', OVERLAY_PATH);
outlinePath.setAttribute('d', CAR_HOLE);

// ─── ViewBox helpers ─────────────────────────────────────────────────────────
function applyViewBox({ x, y, w, h }) {
  const s = `${x} ${y} ${w} ${h}`;
  overlaySvg.setAttribute('viewBox', s);
  outlineSvg.setAttribute('viewBox', s);
}

// ─── Easing & lerp ───────────────────────────────────────────────────────────
function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpVB(a, b, t) {
  return { x: lerp(a.x, b.x, t), y: lerp(a.y, b.y, t),
           w: lerp(a.w, b.w, t), h: lerp(a.h, b.h, t) };
}

// ─── Animation state ─────────────────────────────────────────────────────────
let currentIdx = 0;
let busy       = false;
let autoTimer  = null;

function updateUI(idx) {
  labelEl.textContent = STATES[idx].label;
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  centreLine.setAttribute('opacity', STATES[idx].showLine ? '1' : '0');
}

function goTo(toIdx, duration = 750) {
  if (busy) return;
  busy = true;
  clearTimeout(autoTimer);

  const from = STATES[currentIdx];
  const to   = STATES[toIdx];
  const t0   = performance.now();

  function frame(now) {
    const raw = Math.min((now - t0) / duration, 1);
    const e   = easeInOut(raw);
    applyViewBox(lerpVB(from, to, e));

    // fade centre-line in/out mid-transition
    const lineTarget = to.showLine ? 1 : 0;
    const lineNow    = raw > 0.5 ? lineTarget : (from.showLine ? 1 : 0);
    centreLine.setAttribute('opacity', lineNow * 0.9);

    if (raw < 1) {
      requestAnimationFrame(frame);
    } else {
      applyViewBox(to);
      currentIdx = toIdx;
      busy = false;
      updateUI(toIdx);
      scheduleAuto();
    }
  }
  requestAnimationFrame(frame);
}

function goNext() { goTo((currentIdx + 1) % STATES.length); }

function scheduleAuto() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(goNext, 2800);
}

// ─── Init ────────────────────────────────────────────────────────────────────
applyViewBox(STATES[0]);
updateUI(0);
scheduleAuto();

// tap / click to advance manually
const stage = document.getElementById('stage');
stage.addEventListener('pointerdown', e => { e.preventDefault(); goNext(); });
</script>
</body>
</html>
